<svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Main gradient: Purple → Cyan → Purple (responsive to theme) -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <!-- Secondary gradient: Orange → Yellow (for accents) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>

    <!-- Styles for light/dark mode -->
    <style>
      .logo-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -0.5px;
        fill: #18181b;
      }

      @media (prefers-color-scheme: dark) {
        .logo-text {
          fill: #ffffff;
        }
      }
    </style>
  </defs>

  <!-- Icon Group: Stylized TRPY letters as flowing shapes -->
  <g>
    <!-- Letter T (purple gradient) -->
    <g>
      <!-- Top bar of T -->
      <path d="M 6 8 L 14 8 Q 15 8 15 9 L 15 10 Q 15 11 14 11 L 11 11 L 11 18 Q 11 19 10 19 L 9 19 Q 8 19 8 18 L 8 11 L 5 11 Q 4 11 4 10 L 4 9 Q 4 8 5 8 Z" fill="url(#mainGradient)" opacity="0.95"/>
    </g>

    <!-- Letter R (cyan-to-purple gradient) -->
    <g>
      <!-- Vertical stem + rounded bump -->
      <path d="M 17 8 L 17 18 Q 17 19 16 19 L 15 19 Q 14 19 14 18 L 14 8 Q 14 7 15 7 L 17 7 Q 20 7 20 10 Q 20 12 18.5 12.5 L 20.5 18 Q 21 19 20 19 L 19 19 Q 18 19 17.5 17.5 L 15.5 13 L 15 13 Q 14 13 14 12 L 17 12 Q 19 12 19 10 Q 19 8 17 8 Z" fill="url(#mainGradient)" opacity="0.95"/>
    </g>

    <!-- Letter P (mixed gradient - purple to cyan) -->
    <g>
      <!-- Stem + rounded top -->
      <path d="M 22 8 L 22 18 Q 22 19 21 19 L 20 19 Q 19 19 19 18 L 19 8 Q 19 7 20 7 L 22 7 Q 25 7 25 10 Q 25 13 22 13 L 20 13 Q 19 13 19 12 L 22 12 Q 24 12 24 10 Q 24 8 22 8 Z" fill="url(#mainGradient)" opacity="0.95"/>
    </g>

    <!-- Letter Y (orange accent gradient) -->
    <g>
      <!-- Two upper arms converging to single stem -->
      <path d="M 27 7 L 29 12 L 29 18 Q 29 19 28 19 L 27 19 Q 26 19 26 18 L 26 12 L 24 7 Q 23.5 6 24.5 6 L 25.5 6 Q 26 6 26.5 7 L 28 11 L 29.5 7 Q 30 6 30.5 6 L 31.5 6 Q 32.5 6 32 7 L 30 12 L 30 18 Q 30 19 29 19 L 28 19 Q 27 19 27 18 L 27 12 Z" fill="url(#accentGradient)" opacity="0.95"/>
    </g>
  </g>

  <!-- Text: TRPY -->
  <text x="38" y="26" class="logo-text">TRPY</text>
</svg>
