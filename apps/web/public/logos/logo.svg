<svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Define styles for light/dark mode -->
  <defs>
    <style>
      .logo-icon { fill: #6366f1; }
      .logo-text { fill: #18181b; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

      @media (prefers-color-scheme: dark) {
        .logo-text { fill: #ffffff; }
      }
    </style>
  </defs>

  <!-- Icon: Stylized compass/map pin with gradient movement -->
  <g>
    <!-- Outer circle — accent indigo -->
    <circle cx="12" cy="20" r="9.5" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Inner compass star shape -->
    <g transform="translate(12, 20)">
      <!-- Top point -->
      <path d="M 0 -5.5 L 1.2 -1.5 L 0 0 Z" class="logo-icon"/>
      <!-- Right point -->
      <path d="M 5.5 0 L 1.5 1.2 L 0 0 Z" class="logo-icon"/>
      <!-- Bottom point -->
      <path d="M 0 5.5 L -1.2 1.5 L 0 0 Z" class="logo-icon"/>
      <!-- Left point -->
      <path d="M -5.5 0 L -1.5 -1.2 L 0 0 Z" class="logo-icon"/>
    </g>

    <!-- Center dot -->
    <circle cx="12" cy="20" r="1.2" class="logo-icon"/>
  </g>

  <!-- Text: TRPY -->
  <text x="28" y="26" class="logo-text">TRPY</text>
</svg>
